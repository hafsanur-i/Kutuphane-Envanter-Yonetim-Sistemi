<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container fade-in">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card p-4 p-md-5">
                    <h2 class="text-center mb-4 fw-bold">Library Portal</h2>
                    
                    <ul class="nav nav-tabs justify-content-center mb-4" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="student-tab" data-bs-toggle="tab" data-bs-target="#student" type="button" role="tab">Student</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="personnel-tab" data-bs-toggle="tab" data-bs-target="#personnel" type="button" role="tab">Personnel</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin" type="button" role="tab">Admin</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="authTabsContent">
                        <!-- Student Tab -->
                        <div class="tab-pane fade show active" id="student" role="tabpanel">
                            <div id="studentLoginSection">
                                <form id="studentLoginForm">
                                    <div class="mb-3">
                                        <label class="form-label">School Number</label>
                                        <input type="text" class="form-control" id="studentId" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Password</label>
                                        <input type="password" class="form-control" id="studentPassword" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary-custom w-100 mb-3">Login</button>
                                    <p class="text-center small">New here? <a href="#" id="showSignupBtn" class="text-info text-decoration-none">Sign Up</a></p>
                                </form>
                            </div>
                            <div id="studentSignupSection" class="d-none">
                                <form id="studentSignupForm">
                                    <div class="mb-3">
                                        <label class="form-label">School Number</label>
                                        <input type="text" class="form-control" id="signupId" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Password</label>
                                        <input type="password" class="form-control" id="signupPassword" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Confirm Password</label>
                                        <input type="password" class="form-control" id="signupPasswordConfirm" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary-custom w-100 mb-3">Sign Up</button>
                                    <p class="text-center small">Already have an account? <a href="#" id="showLoginBtn" class="text-info text-decoration-none">Login</a></p>
                                </form>
                            </div>
                        </div>

                        <!-- Personnel Tab -->
                        <div class="tab-pane fade" id="personnel" role="tabpanel">
                            <form id="personnelLoginForm">
                                <div class="mb-3">
                                    <label class="form-label">Personnel ID</label>
                                    <input type="text" class="form-control" id="personnelId" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" id="personnelPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary-custom w-100">Login</button>
                            </form>
                        </div>

                        <!-- Admin Tab -->
                        <div class="tab-pane fade" id="admin" role="tabpanel">
                            <form id="adminLoginForm">
                                <div class="mb-3">
                                    <label class="form-label">Admin Username</label>
                                    <input type="text" class="form-control" id="adminId" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" id="adminPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary-custom w-100">Login</button>
                            </form>
                        </div>
                    </div>
                    
                    <div id="authAlert" class="alert d-none mt-3" role="alert"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
