<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Browse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="browse.html">
                <i class="bi bi-book-half text-primary"></i> Library
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="navLinks">
                    <!-- Populated dynamically via JS based on role -->
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-light btn-sm" id="scannerBtn" data-bs-toggle="modal" data-bs-target="#scannerModal">
                        <i class="bi bi-camera"></i> Scan ISBN
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4 fade-in">
        <div class="row mb-4 glass-card p-3 mx-0">
            <div class="col-md-4 mb-2 mb-md-0">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by Title, Author, ISBN...">
            </div>
            <div class="col-md-3 mb-2 mb-md-0">
                <select id="filterBy" class="form-select">
                    <option value="all">All Fields</option>
                    <option value="name">Title</option>
                    <option value="author">Author</option>
                    <option value="publisher">Publisher</option>
                    <option value="publishYear">Publish Year</option>
                </select>
            </div>
            <div class="col-md-3 mb-2 mb-md-0">
                <select id="availabilityFilter" class="form-select">
                    <option value="all">All Books</option>
                    <option value="available">In Stock</option>
                </select>
            </div>
            <div class="col-md-2 d-grid">
                <button id="searchBtn" class="btn btn-primary-custom">Search</button>
            </div>
        </div>

        <div class="row" id="booksGrid">
            <!-- Books injected here -->
        </div>
    </div>

    <!-- Scanner Modal -->
    <div class="modal fade" id="scannerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-dark">
                <div class="modal-header">
                    <h5 class="modal-title">Scan ISBN Barcode</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <div id="reader"></div>
                    <div id="scannerResult" class="mt-3 text-success fw-bold"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Html5Qrcode Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/browse.js"></script>
</body>
</html>
