<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="browse.html">
                <i class="bi bi-book-half text-primary"></i> Library
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="browse.html"><i class="bi bi-search"></i> Browse</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-danger btn-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4 fade-in">
        <div class="row">
            <!-- Shopping Cart -->
            <div class="col-md-5 mb-4">
                <div class="glass-card p-4 h-100">
                    <h4 class="mb-4 fw-bold"><i class="bi bi-cart"></i> Your Cart</h4>
                    <div id="cartItems" class="mb-4">
                        <!-- Cart items injected here -->
                    </div>
                    
                    <div id="checkoutSection" class="d-none border-top pt-3 mt-3 border-secondary">
                        <label class="form-label">Select Loan Duration</label>
                        <select id="loanDuration" class="form-select mb-3">
                            <option value="7">7 Days</option>
                            <option value="14">14 Days</option>
                            <option value="30">30 Days</option>
                        </select>
                        <button id="checkoutBtn" class="btn btn-primary-custom w-100">Confirm Checkout</button>
                    </div>
                </div>
            </div>

            <!-- My Books -->
            <div class="col-md-7 mb-4" id="mybooks">
                <div class="glass-card p-4 h-100">
                    <h4 class="mb-4 fw-bold"><i class="bi bi-journal-bookmark"></i> My Active Loans</h4>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-borderless text-light align-middle">
                            <thead class="border-bottom border-secondary">
                                <tr>
                                    <th>Book</th>
                                    <th>Checkout Date</th>
                                    <th>Due Date</th>
                                    <th>Time Left</th>
                                </tr>
                            </thead>
                            <tbody id="myLoansTable">
                                <!-- Loans injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
