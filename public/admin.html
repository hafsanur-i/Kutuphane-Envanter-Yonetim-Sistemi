<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="browse.html">
                <i class="bi bi-shield-lock text-primary"></i> Admin Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="browse.html"><i class="bi bi-search"></i> Browse</a></li>
                    <li class="nav-item"><a class="nav-link" href="personnel.html"><i class="bi bi-person-badge"></i> Personnel Page</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-danger btn-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4 fade-in">
        <!-- Global Stats -->
        <h4 class="mb-4 fw-bold">Global Overview</h4>
        <div class="row text-center mb-5">
            <div class="col-md-3 mb-3">
                <div class="glass-card p-4">
                    <h2 class="text-primary fw-bold" id="adminTotalUsers">0</h2>
                    <p class="text-light mb-0">Total Users</p>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="glass-card p-4">
                    <h2 class="text-info fw-bold" id="adminTotalUniqueBooks">0</h2>
                    <p class="text-light mb-0">Unique Books</p>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="glass-card p-4">
                    <h2 class="text-success fw-bold" id="adminTotalStock">0</h2>
                    <p class="text-light mb-0">Total Stock</p>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="glass-card p-4">
                    <h2 class="text-warning fw-bold" id="adminTotalLended">0</h2>
                    <p class="text-light mb-0">Currently Lended</p>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Create User Form -->
            <div class="col-md-4 mb-4">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-person-plus"></i> Create Personnel/Admin</h5>
                    <form id="createUserForm">
                        <div class="mb-3">
                            <label class="form-label">Username / ID</label>
                            <input type="text" class="form-control" id="newUserId" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="newUserPassword" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select" id="newUserRole">
                                <option value="personnel">Personnel</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100">Create Account</button>
                    </form>
                </div>
            </div>

            <!-- Manage Users List -->
            <div class="col-md-8 mb-4">
                <div class="glass-card p-4 h-100">
                    <h5 class="fw-bold mb-3"><i class="bi bi-people"></i> Manage All Users</h5>
                    <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                        <table class="table table-dark table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="allUsersTable">
                                <!-- Users injected -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-dark">
                <div class="modal-header">
                    <h5 class="modal-title">Edit User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editUserForm">
                        <input type="hidden" id="editUserId">
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select" id="editUserRole">
                                <option value="student">Student</option>
                                <option value="personnel">Personnel</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="editUserStatus">
                                <option value="active">Active</option>
                                <option value="pending">Pending</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password (leave blank to keep current)</label>
                            <input type="password" class="form-control" id="editUserPassword">
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
